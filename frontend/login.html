<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - WPI Airline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0TFIUB+PVlZ2nOSi+DCfikelgFf5" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-wpi-gradient">
    <div class="container">
      <a class="navbar-brand" href="home.html">WPI Airline</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="auth-wrapper">
    <div class="card auth-card shadow">
      <div class="card-body p-4">
        <h1 class="text-center mb-1 fs-3 fw-bold">WPI Airline</h1>
        <p class="text-center text-muted mb-4">Sign in to your account for easy access</p>

        <form id="login-form">
          <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter your username" autocomplete="username" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label fw-semibold">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password" />
          </div>
          <button type="submit" class="btn btn-wpi w-100 py-2">Login</button>
        </form>

        <div id="msg" class="alert mt-3 d-none" role="alert"></div>

        <p class="text-center mt-3 mb-0 text-muted small">
          Don't have an account? <a href="signup.html" class="text-decoration-none fw-semibold" style="color: var(--wpi-primary)">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
