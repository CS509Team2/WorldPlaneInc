<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card">
    <h1>WPI Airline</h1>
    <p class="subtitle">Sign in to your account for easy access</p>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn">Login</button>

    </form>

    <div id="msg" class="message"></div>

    <p class="footer-link">Don't have an account? <a href="signup.html">Sign up</a> or <a>Join as Guest</a></p>
  </div>

  <script src="app.js"></script>
</body>

</html>
