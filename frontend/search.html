<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Flights - WPI Airline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0TFIUB+PVlZ2nOSi+DCfikelgFf5" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-wpi-gradient">
    <div class="container">
      <a class="navbar-brand" href="home.html">WPI Airline</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="search.html">Search Flights</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><span class="nav-link" id="nav-username"></span></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logout-link">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="fw-bold mb-4">Search Flights</h2>

    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form id="search-form">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="departure-airport" class="form-label fw-semibold">Departure Airport</label>
              <input type="text" class="form-control" id="departure-airport" list="airport-list"
                     placeholder="e.g. Atlanta (ATL)" required />
            </div>
            <div class="col-md-6">
              <label for="arrival-airport" class="form-label fw-semibold">Arrival Airport</label>
              <input type="text" class="form-control" id="arrival-airport" list="airport-list"
                     placeholder="e.g. Los Angeles (LAX)" required />
            </div>
            <div class="col-md-4">
              <label for="departure-date" class="form-label fw-semibold">Departure Date</label>
              <input type="date" class="form-control" id="departure-date" required />
            </div>
            <div class="col-md-4">
              <label for="return-date" class="form-label fw-semibold">Return Date (optional)</label>
              <input type="date" class="form-control" id="return-date" />
            </div>
            <div class="col-md-4 d-flex align-items-end">
              <div class="form-check form-switch">
                <input class="form-check-input" type="checkbox" id="round-trip-toggle" />
                <label class="form-check-label fw-semibold" for="round-trip-toggle">Round Trip</label>
              </div>
            </div>

            <div class="col-12">
              <a class="text-decoration-none small fw-semibold" data-bs-toggle="collapse" href="#time-filters" role="button">
                Advanced Time Filters &#9662;
              </a>
            </div>
            <div class="collapse" id="time-filters">
              <div class="row g-3 mt-1">
                <div class="col-md-3">
                  <label for="dep-time-start" class="form-label small">Depart After</label>
                  <input type="time" class="form-control form-control-sm" id="dep-time-start" />
                </div>
                <div class="col-md-3">
                  <label for="dep-time-end" class="form-label small">Depart Before</label>
                  <input type="time" class="form-control form-control-sm" id="dep-time-end" />
                </div>
                <div class="col-md-3">
                  <label for="arr-time-start" class="form-label small">Arrive After</label>
                  <input type="time" class="form-control form-control-sm" id="arr-time-start" />
                </div>
                <div class="col-md-3">
                  <label for="arr-time-end" class="form-label small">Arrive Before</label>
                  <input type="time" class="form-control form-control-sm" id="arr-time-end" />
                </div>
              </div>
            </div>
          </div>

          <button type="submit" class="btn btn-wpi mt-3 px-4 py-2">
            <span id="search-btn-text">Search Flights</span>
            <span id="search-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
          </button>
        </form>

        <datalist id="airport-list">
          <option value="Atlanta (ATL)">
          <option value="Los Angeles (LAX)">
          <option value="Chicago (ORD)">
          <option value="Dallas (DFW)">
          <option value="Denver (DEN)">
          <option value="New York (JFK)">
          <option value="San Francisco (SFO)">
          <option value="Seattle (SEA)">
          <option value="Las Vegas (LAS)">
          <option value="Orlando (MCO)">
          <option value="Miami (MIA)">
          <option value="Boston (BOS)">
          <option value="Phoenix (PHX)">
          <option value="Houston (IAH)">
          <option value="Minneapolis (MSP)">
          <option value="Detroit (DTW)">
          <option value="Philadelphia (PHL)">
          <option value="Nashville (BNA)">
          <option value="Baltimore (BWI)">
          <option value="Salt Lake City (SLC)">
        </datalist>
      </div>
    </div>

    <div id="search-error" class="alert alert-danger d-none"></div>

    <div id="results-section" class="d-none">
      <div class="d-flex flex-wrap justify-content-between align-items-center mb-3">
        <h4 class="fw-bold mb-0" id="results-heading">Outbound Flights</h4>
        <div class="d-flex gap-2 flex-wrap mt-2 mt-md-0">
          <div class="btn-group btn-group-sm" role="group">
            <button class="btn btn-outline-secondary active" data-sort="duration">Duration</button>
            <button class="btn btn-outline-secondary" data-sort="stops">Stops</button>
            <button class="btn btn-outline-secondary" data-sort="depart">Departure</button>
          </div>
          <select class="form-select form-select-sm" id="filter-stops" style="width: auto;">
            <option value="all">All Stops</option>
            <option value="0">Direct Only</option>
            <option value="1">1 Stop Max</option>
            <option value="2">2 Stops Max</option>
          </select>
          <div class="d-flex gap-1 align-items-center">
            <div class="form-check form-check-inline mb-0">
              <input class="form-check-input" type="checkbox" id="filter-delta" value="Delta" checked />
              <label class="form-check-label small" for="filter-delta">Delta</label>
            </div>
            <div class="form-check form-check-inline mb-0">
              <input class="form-check-input" type="checkbox" id="filter-southwest" value="Southwest" checked />
              <label class="form-check-label small" for="filter-southwest">Southwest</label>
            </div>
          </div>
        </div>
      </div>

      <div id="outbound-results"></div>

      <div id="return-section" class="d-none mt-5">
        <h4 class="fw-bold mb-3">Return Flights</h4>
        <div id="return-results"></div>
      </div>
    </div>

    <div id="no-results" class="d-none text-center py-5">
      <h5 class="text-muted">No flights found matching your criteria.</h5>
      <p class="text-muted">Try adjusting your dates or airports.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
