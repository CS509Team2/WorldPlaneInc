<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Confirmed - WPI Airline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0TFIUB+PVlZ2nOSi+DCfikelgFf5" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-wpi-gradient">
    <div class="container">
      <a class="navbar-brand" href="home.html">WPI Airline</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search.html">Search Flights</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><span class="nav-link" id="nav-username"></span></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logout-link">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow text-center">
          <div class="card-body p-5">
            <div class="mb-3">
              <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#198754" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
              </svg>
            </div>
            <h2 class="fw-bold text-success">Booking Confirmed!</h2>
            <p class="text-muted mt-2">Your seat has been successfully reserved.</p>
            <hr />
            <div class="text-start">
              <p><strong>Flight:</strong> <span id="conf-flight"></span></p>
              <p><strong>Airline:</strong> <span id="conf-airline"></span></p>
              <p><strong>Seat:</strong> <span id="conf-seat"></span></p>
              <p><strong>Class:</strong> <span id="conf-class"></span></p>
              <p><strong>Passenger:</strong> <span id="conf-username"></span></p>
            </div>
            <hr />
            <div class="d-flex gap-2 justify-content-center">
              <a href="search.html" class="btn btn-wpi">Search More Flights</a>
              <a href="home.html" class="btn btn-outline-secondary">Back to Home</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
  <script>
    (function() {
      const username = sessionStorage.getItem("username");
      if (!username) { window.location.href = "login.html"; return; }
      document.getElementById("nav-username").textContent = username;
      document.getElementById("logout-link").addEventListener("click", function(e) {
        e.preventDefault(); sessionStorage.clear(); window.location.href = "login.html";
      });

      const booking = JSON.parse(sessionStorage.getItem("lastBooking") || "null");
      if (!booking) { window.location.href = "search.html"; return; }

      document.getElementById("conf-flight").textContent = booking.flightNumber;
      document.getElementById("conf-airline").textContent = booking.airline;
      document.getElementById("conf-seat").textContent = booking.seatNumber;
      document.getElementById("conf-class").textContent = booking.seatClass || "Economy";
      document.getElementById("conf-username").textContent = username;
    })();
  </script>
</body>
</html>
