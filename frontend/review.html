<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="card" style = "width: 36rem;">
    <h1 style="text-align: center;">
        Confirm Flight
    </h1>
    <hr>
    <div style="text-align:left;">
        <h2 id="flight-path" style="font-weight: bold;">ABC - XYZ</h2>
        <p id="flight-time">00:00A-00:00P</p>
        <p id="flight-date">MM/DD/YYYY</p>
        <br>
        <p id="flight-itinerary">Round Trip</p>
        <p id="flight-seats">Seats: </p>
        <br>
        <h2 id="flight-price">Total Price:</h2>
    </div>
    <hr>
    <div style="display:flex; gap: 1rem;">
        <button class="btn"
            style="background: linear-gradient(135deg, #66eaba 0%, #4b6ea2 100%);"
        >
            Confirm
        </button>
        <button class="btn"
            style="background: linear-gradient(135deg, #ea6692 0%, #a24b91 100%);"
        >
            Cancel
        </button>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
