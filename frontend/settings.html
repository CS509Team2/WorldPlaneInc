<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Settings - WPI Airline</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-wpi-gradient">
        <div class="container">
            <a class="navbar-brand" href="home.html">WPI Airline</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html">Search Flights</a></li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" id="nav-username" href="settings.html"></a></li>
                    <li class="nav-item"><a class="nav-link" href="#" id="logout-link">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <h2 class="fw-bold mb-4">User Settings</h2>

        <div id="settings-msg" class="alert d-none" role="alert"></div>

        <div class="row g-4">
            <div class="col-md-4 col-lg-3">
                <div class="card shadow-sm settings-side-card">
                    <div class="list-group list-group-flush" id="settings-sidebar">
                        <button class="list-group-item list-group-item-action active" data-settings-tab="general"
                            id="settingsButton">
                            General
                        </button>
                        <button class="list-group-item list-group-item-action" data-settings-tab="notifications"
                            disabled>
                            Notifications
                        </button>
                        <button class="list-group-item list-group-item-action" data-settings-tab="reservations"
                            id="reservationButton">
                            Reservations
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-md-8 col-lg-9">
                <div class="card shadow-sm" id="settingsClass">
                    <div class="card-body p-4">
                        <section id="settings-general-section">
                            <h4 class="fw-bold mb-3">General</h4>

                            <div class="mb-3">
                                <label for="settings-username" class="form-label fw-semibold">Username</label>
                                <input type="text" class="form-control" id="settings-username" />
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-semibold">Password</label>

                                <div id="password-button-wrap">
                                    <button type="button" class="btn btn-outline-secondary" id="open-password-modal-btn"
                                        data-bs-toggle="modal" data-bs-target="#verifyPasswordModal">
                                        Change Password
                                    </button>
                                </div>

                                <div id="password-input-wrap" class="d-none mt-2">
                                    <input type="text" class="form-control" id="settings-password"
                                        placeholder="Enter new password" />
                                    <div class="form-text">Password is editable after verification.</div>
                                </div>
                            </div>
                        </section>

                        <div class="d-flex gap-2 justify-content-end mt-4">
                            <button class="btn btn-outline-secondary" id="settings-reset-btn"
                                type="button">Reset</button>
                            <button class="btn btn-wpi" id="settings-save-btn" type="button">Save</button>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm" id="reservationsClass" style="display: none;">
                    <div class="card-body p-4">
                        <section id="settings-reservations-section">
                            <h4 class="fw-bold mb-3">Reservations</h4>
                            <table id="reservationTable"></table>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="verifyPasswordModal" tabindex="-1" aria-labelledby="verifyPasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="verifyPasswordModalLabel">Verify Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <label for="verify-password-input" class="form-label">Enter your current password</label>
                    <input type="password" class="form-control" id="verify-password-input"
                        autocomplete="current-password" />
                    <div id="verify-password-error" class="text-danger small mt-2 d-none">Incorrect password.</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-wpi" id="verify-password-enter-btn">Enter</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="app.js"></script>
</body>

</html>
