<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Your Seat - WPI Airline</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1p0TFIUB+PVlZ2nOSi+DCfikelgFf5" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-wpi-gradient">
    <div class="container">
      <a class="navbar-brand" href="home.html">WPI Airline</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="search.html">Search Flights</a></li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><span class="nav-link" id="nav-username"></span></li>
          <li class="nav-item"><a class="nav-link" href="#" id="logout-link">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <nav aria-label="breadcrumb">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="search.html">Search</a></li>
        <li class="breadcrumb-item active">Seat Selection</li>
      </ol>
    </nav>

    <h2 class="fw-bold mb-2">Select Your Seat</h2>
    <p class="text-muted mb-4" id="flight-info"></p>

    <div id="seat-loading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-2 text-muted">Loading seat map...</p>
    </div>

    <div id="seat-error" class="alert alert-danger d-none"></div>

    <div id="seat-map-container" class="d-none">
      <div class="row">
        <div class="col-lg-8">
          <div class="card shadow-sm mb-4">
            <div class="card-body">
              <div class="d-flex justify-content-center gap-3 mb-3 small">
                <span><span class="badge bg-success">&nbsp;&nbsp;</span> Available</span>
                <span><span class="badge bg-danger">&nbsp;&nbsp;</span> Taken</span>
                <span><span class="badge bg-primary">&nbsp;&nbsp;</span> Selected</span>
                <span><span class="badge bg-warning text-dark">&nbsp;&nbsp;</span> Business</span>
                <span><span class="badge bg-wpi-gradient" style="background:#fd7e14">&nbsp;&nbsp;</span> First</span>
              </div>

              <div class="text-center" id="seat-grid"></div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card shadow-sm sticky-top" style="top: 80px;">
            <div class="card-body">
              <h5 class="fw-bold">Booking Summary</h5>
              <hr />
              <p><strong>Flight:</strong> <span id="summary-flight"></span></p>
              <p><strong>Airline:</strong> <span id="summary-airline"></span></p>
              <p><strong>Seat:</strong> <span id="summary-seat" class="text-muted">None selected</span></p>
              <p><strong>Class:</strong> <span id="summary-class" class="text-muted">-</span></p>
              <p><strong>Price:</strong> <span id="summary-price" class="text-muted">-</span></p>
              <hr />
              <button class="btn btn-wpi w-100 py-2" id="confirm-seat-btn" disabled>Confirm Seat</button>
              <div id="booking-spinner" class="text-center mt-2 d-none">
                <div class="spinner-border spinner-border-sm text-primary" role="status"></div>
                <span class="ms-1 small">Booking...</span>
              </div>
              <div id="booking-error" class="alert alert-danger mt-2 d-none small"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <script src="app.js"></script>
</body>
</html>
