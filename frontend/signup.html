<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="card">
    <h1>WPI Airline</h1>
    <p class="subtitle">Create an account for easy access</p>

    <form id="signup-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Choose a username" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Confirm your password" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn">Sign Up</button>
    </form>

    <div id="msg" class="message"></div>

    <p class="footer-link">Already have an account? <a href="login.html">Login</a></p>
  </div>

  <script src="app.js"></script>
</body>
</html>
